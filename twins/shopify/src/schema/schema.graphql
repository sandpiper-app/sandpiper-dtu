# Shopify Admin API GraphQL Schema (Subset for DTU Twin)
# Matches Shopify's actual schema structure for implemented resources

scalar DateTime
scalar URL
scalar Decimal

# Billing enums
enum AppSubscriptionReplacementBehavior { APPLY_IMMEDIATELY APPLY_ON_NEXT_BILLING_CYCLE STANDARD }
enum AppPurchaseOneTimeSortKeys { CREATED_AT ID RELEVANCE }

# Sort key enums — accepted by list queries but ignored by the twin resolver.
# Allows ShopifyClient production queries to work against the simplified twin schema.
enum ProductSortKeys { CREATED_AT ID INVENTORY_TOTAL PRODUCT_TYPE PUBLISHED_AT RELEVANCE TITLE UPDATED_AT VENDOR }
enum OrderSortKeys { CREATED_AT CUSTOMER_NAME FINANCIAL_STATUS FULFILLMENT_STATUS ID ORDER_NUMBER PROCESSED_AT RELEVANCE TOTAL_PRICE UPDATED_AT }
enum CustomerSortKeys { CREATED_AT ID LAST_ORDER_DATE LOCATION NAME ORDER_COUNT RELEVANCE TOTAL_SPENT UPDATED_AT }

# Money types matching Shopify's structure
type MoneyV2 {
  amount: String!
  currencyCode: String!
}

type MoneySet {
  shopMoney: MoneyV2!
}

# Relay-spec PageInfo type for cursor-based pagination
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

enum OrderDisplayFulfillmentStatus {
  UNFULFILLED
  IN_PROGRESS
  PARTIALLY_FULFILLED
  FULFILLED
}

enum OrderDisplayFinancialStatus {
  PENDING
  AUTHORIZED
  PAID
  PARTIALLY_REFUNDED
  REFUNDED
}

# Shipping address — used in listOrders query
type MailingAddress {
  address1: String
  address2: String
  city: String
  province: String
  country: String
  zip: String
}

# Order types
# All fields expected by ShopifyClient.listOrders() are present; extra fields default to null.
type Order {
  id: ID!
  name: String
  email: String
  status: String
  createdAt: DateTime!
  updatedAt: DateTime!
  closedAt: DateTime
  displayFulfillmentStatus: OrderDisplayFulfillmentStatus
  displayFinancialStatus: OrderDisplayFinancialStatus!
  totalPriceSet: MoneySet!
  tags: [String!]!
  customer: Customer
  lineItems(first: Int = 10): LineItemConnection!
  shippingAddress: MailingAddress
}

type LineItemConnection {
  edges: [LineItemEdge!]!
  nodes: [LineItem!]!
  pageInfo: PageInfo!
}

type LineItemEdge {
  node: LineItem!
  cursor: String!
}

type LineItem {
  id: ID!
  title: String!
  quantity: Int!
  originalUnitPriceSet: MoneySet
  sku: String
}

type OrderConnection {
  edges: [OrderEdge!]!
  nodes: [Order!]!
  pageInfo: PageInfo!
}

type OrderEdge {
  node: Order!
  cursor: String!
}

# Product variant types
type ProductVariantConnection {
  nodes: [ProductVariant!]!
}

type ProductVariant {
  id: ID!
  title: String!
  sku: String
  price: String!
  inventoryQuantity: Int
  inventoryItem: InventoryItemRef
}

type InventoryItemRef {
  id: ID!
}

# Product types
type Product {
  id: ID!
  title: String!
  description: String
  vendor: String
  productType: String
  status: String
  createdAt: DateTime!
  updatedAt: DateTime!
  variants(first: Int): ProductVariantConnection!
}

type ProductConnection {
  edges: [ProductEdge!]!
  nodes: [Product!]!
  pageInfo: PageInfo!
}

type ProductEdge {
  node: Product!
  cursor: String!
}

# Customer types
type AmountV2 {
  amount: String!
}

type Customer {
  id: ID!
  email: String
  firstName: String
  lastName: String
  phone: String
  numberOfOrders: Int!
  amountSpent: AmountV2
  tags: [String!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type CustomerConnection {
  edges: [CustomerEdge!]!
  nodes: [Customer!]!
  pageInfo: PageInfo!
}

type CustomerEdge {
  node: Customer!
  cursor: String!
}

# Inventory types
type InventoryLevel {
  location: Location!
  quantities(names: [String!]!): [InventoryQuantity!]!
}

type InventoryLevelConnection {
  nodes: [InventoryLevel!]!
}

type InventoryQuantity {
  name: String!
  quantity: Int!
}

type Location {
  id: ID!
}

# InventoryItem implements Node so it can be returned by nodes(ids: [ID!]!)
type InventoryItem implements Node {
  id: ID!
  sku: String
  tracked: Boolean!
  available: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  inventoryLevels(first: Int): InventoryLevelConnection!
}

type InventoryItemConnection {
  edges: [InventoryItemEdge!]!
  pageInfo: PageInfo!
}

type InventoryItemEdge {
  node: InventoryItem!
  cursor: String!
}

# Fulfillment types
type Fulfillment {
  id: ID!
  status: String!
  trackingNumber: String
  order: Order
  createdAt: DateTime!
  updatedAt: DateTime!
}

# UserError for mutation responses
type UserError {
  field: [String!]!
  message: String!
}

# Billing types — matches APP_SUBSCRIPTION_FRAGMENT inline fragment pattern
interface AppPricingDetails {
  interval: String
}

type AppRecurringPricing implements AppPricingDetails {
  interval: String
  price: MoneyV2!
  discount: AppSubscriptionDiscount
}

type AppUsagePricing implements AppPricingDetails {
  interval: String
  balanceUsed: MoneyV2!
  cappedAmount: MoneyV2!
  terms: String!
}

type AppSubscriptionDiscount {
  durationLimitInIntervals: Int
  remainingDurationInIntervals: Int
  priceAfterDiscount: MoneyV2
  value: AppSubscriptionDiscountValue
}

union AppSubscriptionDiscountValue = AppSubscriptionDiscountAmount | AppSubscriptionDiscountPercentage

type AppSubscriptionDiscountAmount {
  amount: MoneyV2!
}

type AppSubscriptionDiscountPercentage {
  percentage: Float!
}

type AppSubscriptionLineItem {
  id: ID!
  plan: AppSubscriptionLinePlan!
}

type AppSubscriptionLinePlan {
  pricingDetails: AppPricingDetails!
}

type AppSubscription {
  id: ID!
  name: String!
  test: Boolean!
  status: String!
  trialDays: Int!
  createdAt: String!
  currentPeriodEnd: String
  returnUrl: URL!
  lineItems: [AppSubscriptionLineItem!]!
}

type AppSubscriptionCreatePayload {
  appSubscription: AppSubscription
  confirmationUrl: String
  userErrors: [UserError!]!
}

type AppPurchaseOneTime {
  id: ID!
  name: String!
  test: Boolean!
  status: String!
  price: MoneyV2!
  createdAt: String!
}

type AppPurchaseOneTimeCreatePayload {
  appPurchaseOneTime: AppPurchaseOneTime
  confirmationUrl: String
  userErrors: [UserError!]!
}

type AppSubscriptionCancelPayload {
  appSubscription: AppSubscription
  userErrors: [UserError!]!
}

type AppPurchaseOneTimeEdge {
  node: AppPurchaseOneTime!
}

type AppPurchaseOneTimeConnection {
  edges: [AppPurchaseOneTimeEdge!]!
  pageInfo: PageInfo!
}

type AppInstallation {
  activeSubscriptions: [AppSubscription!]!
  oneTimePurchases(first: Int, sortKey: AppPurchaseOneTimeSortKeys, after: String): AppPurchaseOneTimeConnection!
}

# Billing input types
input AppSubscriptionLineItemInput { plan: AppSubscriptionLineItemPlanInput! }
input AppSubscriptionLineItemPlanInput {
  appRecurringPricingDetails: AppRecurringPricingInput
  appUsagePricingDetails: AppUsagePricingInput
}
input AppRecurringPricingInput {
  interval: String!
  price: MoneyInput!
  discount: AppSubscriptionDiscountInput
}
input AppUsagePricingInput {
  terms: String!
  cappedAmount: MoneyInput!
}
input AppSubscriptionDiscountInput {
  durationLimitInIntervals: Int
  value: AppSubscriptionDiscountValueInput
}
input AppSubscriptionDiscountValueInput {
  amount: Float
  percentage: Float
}
input MoneyInput {
  amount: Decimal!
  currencyCode: String!
}

input MoneyBagInput {
  shopMoney: MoneyInput!
}

# Input types for mutations
input LineItemInput {
  title: String
  quantity: Int!
  priceSet: MoneyBagInput
}

input OrderInput {
  lineItems: [LineItemInput!]!
  customerId: ID
  totalPrice: String
  currencyCode: String
  financialStatus: OrderDisplayFinancialStatus
}

input OrderCloseInput {
  id: ID!
}

input OrderUpdateInput {
  id: ID!
  lineItems: [LineItemInput!]
  totalPrice: String
  currencyCode: String
}

input ProductInput {
  title: String!
  vendor: String
  productType: String
}

input ProductUpdateInput {
  id: ID!
  title: String
  description: String
  vendor: String
  productType: String
}

input FulfillmentInput {
  orderId: ID!
  status: String
  trackingNumber: String
}

input CustomerInput {
  email: String!
  firstName: String
  lastName: String
}

input InventoryItemUpdateInput {
  id: ID!
  sku: String
  tracked: Boolean
  available: Int
}

# Mutation payloads
type OrderCreatePayload {
  order: Order
  userErrors: [UserError!]!
}

type OrderUpdatePayload {
  order: Order
  userErrors: [UserError!]!
}

type ProductCreatePayload {
  product: Product
  userErrors: [UserError!]!
}

type ProductUpdatePayload {
  product: Product
  userErrors: [UserError!]!
}

type FulfillmentCreatePayload {
  fulfillment: Fulfillment
  userErrors: [UserError!]!
}

type OrderClosePayload {
  order: Order
  userErrors: [UserError!]!
}

type InventoryItemUpdatePayload {
  inventoryItem: InventoryItem
  userErrors: [UserError!]!
}

type CustomerCreatePayload {
  customer: Customer
  userErrors: [UserError!]!
}

# Webhook subscription types
type WebhookSubscription {
  id: ID!
  topic: String!
  callbackUrl: String!
}

type WebhookSubscriptionCreatePayload {
  webhookSubscription: WebhookSubscription
  userErrors: [UserError!]!
}

enum WebhookSubscriptionTopic {
  ORDERS_CREATE
  ORDERS_UPDATED
  ORDERS_DELETE
  PRODUCTS_CREATE
  PRODUCTS_UPDATE
  PRODUCTS_DELETE
  CUSTOMERS_CREATE
  CUSTOMERS_UPDATE
  CUSTOMERS_DELETE
  FULFILLMENTS_CREATE
  FULFILLMENTS_UPDATE
}

input WebhookSubscriptionInput {
  callbackUrl: String!
}

# Shop info type — returned by the Storefront API shop query
type ShopInfo {
  name: String!
}

# Node interface — allows nodes(ids: [ID!]!) bulk lookup used by Shopify Admin API
interface Node {
  id: ID!
}

# Query root — all connections support Relay-spec cursor pagination args
# Additional args (sortKey, reverse, query) are accepted but ignored by the twin.
# This allows Sandpiper's ShopifyClient to send production-style queries without modification.
type QueryRoot {
  orders(first: Int = 10, after: String, last: Int, before: String, sortKey: OrderSortKeys, reverse: Boolean, query: String): OrderConnection!
  order(id: ID!): Order
  products(first: Int = 10, after: String, last: Int, before: String, sortKey: ProductSortKeys, reverse: Boolean): ProductConnection!
  product(id: ID!): Product
  customers(first: Int = 10, after: String, last: Int, before: String, sortKey: CustomerSortKeys, reverse: Boolean): CustomerConnection!
  customer(id: ID!): Customer
  inventoryItems(first: Int = 10, after: String, last: Int, before: String): InventoryItemConnection!
  inventoryItem(id: ID!): InventoryItem
  # nodes(ids: [ID!]!) is used by ShopifyClient.getInventoryLevels() for bulk lookup
  nodes(ids: [ID!]!): [Node]!
  currentAppInstallation: AppInstallation!
  shop: ShopInfo
}

# Mutation root
type MutationType {
  orderCreate(order: OrderInput!): OrderCreatePayload!
  orderUpdate(input: OrderUpdateInput!): OrderUpdatePayload!
  orderClose(input: OrderCloseInput!): OrderClosePayload!
  productCreate(input: ProductInput!): ProductCreatePayload!
  productUpdate(input: ProductUpdateInput!): ProductUpdatePayload!
  fulfillmentCreate(input: FulfillmentInput!): FulfillmentCreatePayload!
  customerCreate(input: CustomerInput!): CustomerCreatePayload!
  inventoryItemUpdate(input: InventoryItemUpdateInput!): InventoryItemUpdatePayload!
  webhookSubscriptionCreate(topic: WebhookSubscriptionTopic!, webhookSubscription: WebhookSubscriptionInput!): WebhookSubscriptionCreatePayload!
  appSubscriptionCreate(name: String!, returnUrl: URL!, lineItems: [AppSubscriptionLineItemInput!]!, test: Boolean, trialDays: Int, replacementBehavior: AppSubscriptionReplacementBehavior): AppSubscriptionCreatePayload!
  appPurchaseOneTimeCreate(name: String!, price: MoneyInput!, returnUrl: URL!, test: Boolean): AppPurchaseOneTimeCreatePayload!
  appSubscriptionCancel(id: ID!, prorate: Boolean): AppSubscriptionCancelPayload!
}

# Schema declaration
schema {
  query: QueryRoot
  mutation: MutationType
}
