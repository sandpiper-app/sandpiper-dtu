# Shopify Admin API GraphQL Schema (Subset for DTU Twin)
# Matches Shopify's actual schema structure for implemented resources

scalar DateTime

# Money types matching Shopify's structure
type MoneyV2 {
  amount: String!
  currencyCode: String!
}

type MoneySet {
  shopMoney: MoneyV2!
}

# Relay-spec PageInfo type for cursor-based pagination
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# Order types
type Order {
  id: ID!
  name: String!
  createdAt: DateTime!
  updatedAt: DateTime!
  totalPriceSet: MoneySet!
  customer: Customer
  lineItems(first: Int = 10): LineItemConnection!
}

type LineItemConnection {
  edges: [LineItemEdge!]!
  pageInfo: PageInfo!
}

type LineItemEdge {
  node: LineItem!
  cursor: String!
}

type LineItem {
  id: ID!
  title: String!
  quantity: Int!
  price: String!
}

type OrderConnection {
  edges: [OrderEdge!]!
  pageInfo: PageInfo!
}

type OrderEdge {
  node: Order!
  cursor: String!
}

# Product types
type Product {
  id: ID!
  title: String!
  description: String
  vendor: String
  productType: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ProductConnection {
  edges: [ProductEdge!]!
  pageInfo: PageInfo!
}

type ProductEdge {
  node: Product!
  cursor: String!
}

# Customer types
type Customer {
  id: ID!
  email: String!
  firstName: String
  lastName: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type CustomerConnection {
  edges: [CustomerEdge!]!
  pageInfo: PageInfo!
}

type CustomerEdge {
  node: Customer!
  cursor: String!
}

# Inventory types
type InventoryItem {
  id: ID!
  sku: String!
  tracked: Boolean!
  available: Int!
}

# Fulfillment types
type Fulfillment {
  id: ID!
  status: String!
  trackingNumber: String
  order: Order
  createdAt: DateTime!
  updatedAt: DateTime!
}

# UserError for mutation responses
type UserError {
  field: [String!]!
  message: String!
}

# Input types for mutations
input LineItemInput {
  title: String!
  quantity: Int!
  price: String!
}

input OrderInput {
  lineItems: [LineItemInput!]!
  customerId: ID
  totalPrice: String!
  currencyCode: String!
}

input OrderUpdateInput {
  id: ID!
  lineItems: [LineItemInput!]
  totalPrice: String
  currencyCode: String
}

input ProductInput {
  title: String!
  description: String
  vendor: String
  productType: String
}

input ProductUpdateInput {
  id: ID!
  title: String
  description: String
  vendor: String
  productType: String
}

input FulfillmentInput {
  orderId: ID!
  status: String
  trackingNumber: String
}

input CustomerInput {
  email: String!
  firstName: String
  lastName: String
}

# Mutation payloads
type OrderCreatePayload {
  order: Order
  userErrors: [UserError!]!
}

type OrderUpdatePayload {
  order: Order
  userErrors: [UserError!]!
}

type ProductCreatePayload {
  product: Product
  userErrors: [UserError!]!
}

type ProductUpdatePayload {
  product: Product
  userErrors: [UserError!]!
}

type FulfillmentCreatePayload {
  fulfillment: Fulfillment
  userErrors: [UserError!]!
}

type CustomerCreatePayload {
  customer: Customer
  userErrors: [UserError!]!
}

# Webhook subscription types
type WebhookSubscription {
  id: ID!
  topic: String!
  callbackUrl: String!
}

type WebhookSubscriptionCreatePayload {
  webhookSubscription: WebhookSubscription
  userErrors: [UserError!]!
}

input WebhookSubscriptionInput {
  callbackUrl: String!
}

# Query root — all connections support Relay-spec cursor pagination args
type QueryRoot {
  orders(first: Int = 10, after: String, last: Int, before: String): OrderConnection!
  order(id: ID!): Order
  products(first: Int = 10, after: String, last: Int, before: String): ProductConnection!
  product(id: ID!): Product
  customers(first: Int = 10, after: String, last: Int, before: String): CustomerConnection!
  customer(id: ID!): Customer
}

# Mutation root
type MutationType {
  orderCreate(input: OrderInput!): OrderCreatePayload!
  orderUpdate(input: OrderUpdateInput!): OrderUpdatePayload!
  productCreate(input: ProductInput!): ProductCreatePayload!
  productUpdate(input: ProductUpdateInput!): ProductUpdatePayload!
  fulfillmentCreate(input: FulfillmentInput!): FulfillmentCreatePayload!
  customerCreate(input: CustomerInput!): CustomerCreatePayload!
  webhookSubscriptionCreate(topic: String!, webhookSubscription: WebhookSubscriptionInput!): WebhookSubscriptionCreatePayload!
}

# Schema declaration
schema {
  query: QueryRoot
  mutation: MutationType
}
