name: Conformance

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC for live conformance
  workflow_dispatch:
      inputs:
          live:
              description: "Test against live APIs"
              required: true
              default: false
              type: boolean

jobs:
  conformance-twin:
    name: Shopify Twin Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify submodule initialization
        run: |
          git submodule status | grep "^-" && \
            echo "ERROR: Uninitialized submodules detected" && exit 1 || \
            echo "All submodules initialized"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Run Shopify twin conformance suite
        run: pnpm --filter @dtu/twin-shopify run conformance:twin

  conformance-twin-slack:
    name: Slack Twin Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify submodule initialization
        run: |
          git submodule status | grep "^-" && \
            echo "ERROR: Uninitialized submodules detected" && exit 1 || \
            echo "All submodules initialized"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Run Slack twin conformance suite
        run: pnpm --filter @dtu/twin-slack run conformance:twin

  sdk-verification:
    name: SDK Verification (INFRA-12, INFRA-14)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify submodule initialization
        run: |
          git submodule status | grep "^-" && \
            echo "ERROR: Uninitialized submodules detected" && exit 1 || \
            echo "All submodules initialized"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild better-sqlite3 from source
        run: pnpm rebuild better-sqlite3 --build-from-source

      - name: Build packages
        run: pnpm build

      - name: Run SDK verification suite (pnpm test:sdk)
        run: pnpm test:sdk

      - name: Run SDK drift check (pnpm drift:check)
        run: pnpm drift:check

  conformance-live:
    name: Shopify Live Conformance (scheduled only)
    if: ${{ (github.event_name == 'schedule') || (github.event_name == 'workflow_dispatch' && inputs.live) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify submodule initialization
        run: |
          git submodule status | grep "^-" && \
            echo "ERROR: Uninitialized submodules detected" && exit 1 || \
            echo "All submodules initialized"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      # Uses Custom App client credentials (long-lived) instead of a short-lived
      # OAuth access token (expires 24h). Set SHOPIFY_CLIENT_ID and
      # SHOPIFY_CLIENT_SECRET in repo secrets from the Custom App's API credentials
      # page (Store Admin > Apps > Develop apps > [your app] > API credentials).
      - name: Run live conformance suite against Shopify dev store
        run: pnpm --filter @dtu/twin-shopify run conformance:live
        env:
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}

  conformance-live-slack:
    name: Slack Live Conformance (scheduled only)
    if: ${{ (github.event_name == 'schedule') || (github.event_name == 'workflow_dispatch' && inputs.live) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify submodule initialization
        run: |
          git submodule status | grep "^-" && \
            echo "ERROR: Uninitialized submodules detected" && exit 1 || \
            echo "All submodules initialized"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Run live conformance suite against Slack workspace
        run: pnpm --filter @dtu/twin-slack run conformance:live
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
